</head>
<body>
    <header>
        <a href="https://greywaves.github.io">GreyWaves</a>
        <nav>
            <ul>
                <li><a href='https://greywaves.github.io'>Home</a></li>

    <main>
        <h1>Contact Me</h1>
        <p>If you want me to add anything, update your club's details, add new equipment or anything else at all, you can contact me using the form below.</p>
        <h2>Form</h2>
        <form action="https://formspree.io/f/xgobrdaa" method="post">
                <div>
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required>
    </div>
    <div>
        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div>
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" required>
    </div>
    <div>
    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="5" required></textarea>
</div>
    <button type="submit">Send Your Message</button>
    </form>
</main>
</body>
</html>
